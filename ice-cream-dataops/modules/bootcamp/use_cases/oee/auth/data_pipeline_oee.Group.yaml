name: {{ data_pipeline_oee_name }}
sourceId: {{ data_pipeline_oee_source_id }}
capabilities:
  - functionsAcl:
      actions: [READ, WRITE]
      scope:
        datasetScope:
          ids: [{{ uc_oee_ds_external_id }}]
  - groupsAcl:
      actions: [LIST, READ]
      scope:
        currentuserscope: {}
  - projectsAcl:
      actions: [LIST, READ]
      scope:
        all: {}
  - sessionsAcl:
      actions: [LIST, CREATE, DELETE]
      scope:
        all: {}
  - timeSeriesAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
